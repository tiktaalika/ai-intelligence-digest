name: Daily No-API Newsletter Site

on:
  workflow_dispatch:
  schedule:
    # Avoid the top-of-hour GitHub Actions schedule rush, where cron jobs can be delayed or dropped.
    - cron: "18 6 * * *"

permissions:
  contents: write

jobs:
  refresh-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Build public news candidates
        run: |
          DATE="$(TZ=Europe/Berlin date +%F)"
          python3 scripts/build_digest_candidates.py --window-hours 24 --date "$DATE"
      - name: Render combined site
        run: python3 scripts/render_digest_site.py
      - name: Commit site artifacts
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update no-api newsletter site"
          file_pattern: "data/digests/*-candidates.json data/digests/*-briefing-input.md site/**"
