name: Daily No-API Newsletter Site

on:
  workflow_dispatch:
  schedule:
    # GitHub scheduled workflows are best-effort and can be delayed or dropped.
    # Run several idempotent morning attempts so one missed trigger does not skip the day.
    - cron: "18 6 * * *"
    - cron: "48 6 * * *"
    - cron: "18 7 * * *"
    - cron: "48 7 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  refresh-site:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Show trigger context
        run: |
          echo "event=${{ github.event_name }}"
          echo "schedule=${{ github.event.schedule }}"
          TZ=Europe/Berlin date
      - name: Build public news candidates
        run: |
          DATE="$(TZ=Europe/Berlin date +%F)"
          python3 scripts/build_digest_candidates.py --window-hours 24 --date "$DATE"
      - name: Generate daily markdown report
        run: |
          DATE="$(TZ=Europe/Berlin date +%F)"
          python3 scripts/generate_daily_report.py --date "$DATE"
      - name: Render combined site
        run: python3 scripts/render_digest_site.py
      - name: Check recent duplicate items
        run: |
          DATE="$(TZ=Europe/Berlin date +%F)"
          python3 scripts/check_recent_duplicates.py --date "$DATE" --lookback-days 7
      - name: Commit site artifacts
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update no-api newsletter site"
          file_pattern: "data/digests/*-candidates.json data/digests/*-briefing-input.md data/digests/*-final.md site/**"
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload site
        uses: actions/upload-pages-artifact@v4
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
