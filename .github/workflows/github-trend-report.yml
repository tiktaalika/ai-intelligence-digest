name: GitHub Trend Report

on:
  workflow_dispatch:
  schedule:
    - cron: "30 6 * * 1"
    - cron: "15 7 1 * *"

permissions:
  contents: write

jobs:
  trend-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Collect trend data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m trend_report collect
      - name: Generate weekly report
        run: python -m trend_report weekly
      - name: Generate monthly report on first day
        if: github.event_name == 'workflow_dispatch' || startsWith(github.event.schedule, '15 7 1')
        run: python -m trend_report monthly
      - name: Render website with trend links
        run: python3 scripts/render_digest_site.py
      - name: Commit report artifacts
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update GitHub trend reports"
          file_pattern: "data/snapshots/** data/repos.jsonl data/logs/trend_report.log reports/weekly/** reports/monthly/** site/**"
