image: python:3.11-slim

stages:
  - deploy

pages:
  stage: deploy
  before_script:
    - python -m pip install --upgrade pip
    - python -m pip install -r requirements.txt
  script:
    - DATE="$(TZ=Europe/Berlin date +%F)"
    - python3 scripts/build_digest_candidates.py --window-hours 24 --date "$DATE"
    - python3 scripts/render_digest_site.py
    - rm -rf public
    - cp -r site public
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE =~ /^(push|web|schedule)$/'
