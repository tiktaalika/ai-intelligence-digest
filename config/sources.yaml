  - name: Google News General AI Discovery
    url: https://news.google.com/rss/search
    source_type: rss
    fetch_type: google_news_rss
    category: general_ai
    priority: high
    tags: [discovery, news]
    query: (AI OR "artificial intelligence" OR OpenAI OR Anthropic OR "Google DeepMind" OR "Meta AI" OR RAG) when:1d
    notes: Broad recall source.
    enabled: true
  - name: Google News AI Payments and Agent Commerce
    url: https://news.google.com/rss/search
    source_type: rss
    fetch_type: google_news_rss
    category: general_ai
    priority: high
    tags: [agent_commerce, payments]
    query: (OpenAI OR ChatGPT OR Visa OR Mastercard OR Stripe OR PayPal) ("AI agent" OR "agentic commerce" OR "AI payments" OR "agent payments" OR checkout OR wallet OR "payment system") when:2d
    notes: Captures AI-agent payment infrastructure news.
    enabled: true
  - name: Google News Frontier AI Policy and Access
    url: https://news.google.com/rss/search
    source_type: rss
    fetch_type: google_news_rss
    category: general_ai
    priority: high
    tags: [policy, safety, frontier_models]
    query: (Anthropic OR Claude OR OpenAI OR Microsoft OR "Dario Amodei") (regulation OR "data terms" OR "employee access" OR policy OR safety OR Washington) when:2d
    notes: Captures policy, access, and safety governance items.
    enabled: true
  - name: Google News Engineering AI Discovery
    url: https://news.google.com/rss/search
    source_type: rss
    fetch_type: google_news_rss
    category: engineering_ai
    priority: high
    tags: [engineering_ai, discovery]
    query: (CAE OR "computer-aided engineering" OR SPDM OR PLM OR CAD OR "digital twin" OR "physical AI" OR "scientific ML" OR "industrial AI" OR "engineering simulation" OR CFD OR FEA) (AI OR "machine learning" OR neural OR surrogate) when:30d
    notes: Broad engineering AI recall source.
    enabled: true
  - name: LinkedIn Engineering AI Public Posts
    url: https://www.linkedin.com/search/results/content/
    source_type: linkedin_manual
    category: engineering_ai
    priority: medium
    tags: [linkedin, engineering_ai, manual]
    query: (CAE OR simulation OR CFD OR FEA OR digital twin OR surrogate model OR SPDM OR PLM) (AI OR machine learning)
    notes: Manual public LinkedIn review; do not scrape logged-in feeds.
    enabled: true
  - name: Curated AI Newsletter Discovery
    url: https://news.google.com/rss/search
    source_type: newsletter
    fetch_type: google_news_rss
    category: community
    priority: medium
    tags: [newsletter, curated]
    query: ("Generative AI Daily Newsletter" OR "AI newsletter" OR "The Rundown AI" OR "Ben's Bites" OR "Superhuman AI" OR "Import AI") (OpenAI OR Anthropic OR Claude OR ChatGPT OR "AI agent") when:2d
    notes: Discovery source for curated newsletters; add exact newsletter archives when known.
    enabled: true
