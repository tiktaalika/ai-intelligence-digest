notes:
  - Curated source registry for the AI Intelligence Digest.
  - This is an extensible default registry, not a closed source list.
  - Add, disable, reprioritize, or edit sources here without changing code.
  - Sources without stable RSS/API are kept as manual or linkedin_manual watchlist items.
  - Avoid illegal or fragile scraping.

source_priority_scores:
  high: 1.0
  medium: 0.65
  low: 0.35

category_window_hours:
  general_ai: 24
  engineering_ai: 720
  research: 168
  startup: 72
  vendor: 72
  community: 48

